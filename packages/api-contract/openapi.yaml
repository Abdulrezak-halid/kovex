openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Kovex ERP API - Smart Business Management for SMEs
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: customers
  - name: suppliers
  - name: products
  - name: warehouses
  - name: stock
  - name: quotations
  - name: orders
  - name: invoices
  - name: purchase-orders
  - name: purchase-invoices
  - name: users
  - name: reports
  - name: planning

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Planning - Projects
  /projects:
    get:
      operationId: listProjects
      tags: [planning]
      summary: List projects
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [planning]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [planning]
      summary: Get project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      operationId: updateProject
      tags: [planning]
      summary: Update project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [planning]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/tasks:
    get:
      operationId: listProjectTasks
      tags: [planning]
      summary: List tasks for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [planning]
      summary: Create task for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks:
    get:
      operationId: listTasks
      tags: [planning]
      summary: List all tasks
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: assignedTo
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [planning]
      summary: Get task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [planning]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [planning]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products
      responses:
        "200":
          description: List of top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent sales orders
      responses:
        "200":
          description: List of recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/low-stock:
    get:
      operationId: getLowStockAlerts
      tags: [dashboard]
      summary: Get products with low stock
      responses:
        "200":
          description: Low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LowStockItem"

  # Customers
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Suppliers
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Products
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Warehouses
  /warehouses:
    get:
      operationId: listWarehouses
      tags: [warehouses]
      summary: List all warehouses
      responses:
        "200":
          description: List of warehouses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warehouse"
    post:
      operationId: createWarehouse
      tags: [warehouses]
      summary: Create a warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"

  /warehouses/{id}:
    get:
      operationId: getWarehouse
      tags: [warehouses]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
    patch:
      operationId: updateWarehouse
      tags: [warehouses]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
    delete:
      operationId: deleteWarehouse
      tags: [warehouses]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Stock
  /stock:
    get:
      operationId: listStock
      tags: [stock]
      summary: List stock levels
      parameters:
        - name: warehouseId
          in: query
          schema:
            type: ["integer", "null"]
        - name: productId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Stock levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockLevel"

  # Quotations
  /quotations:
    get:
      operationId: listQuotations
      tags: [quotations]
      summary: List all quotations
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of quotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quotation"
    post:
      operationId: createQuotation
      tags: [quotations]
      summary: Create a quotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  /quotations/{id}:
    get:
      operationId: getQuotation
      tags: [quotations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"
        "404":
          description: Not found
    patch:
      operationId: updateQuotation
      tags: [quotations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"
    delete:
      operationId: deleteQuotation
      tags: [quotations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotations/{id}/convert:
    post:
      operationId: convertQuotationToOrder
      tags: [quotations]
      summary: Convert quotation to sales order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # Sales Orders
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all sales orders
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a sales order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders/{id}/invoice:
    post:
      operationId: createInvoiceFromOrder
      tags: [orders]
      summary: Create invoice from a sales order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # Invoices
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    patch:
      operationId: updateInvoice
      tags: [invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # Purchase Orders
  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [purchase-orders]
      summary: List all purchase orders
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: supplierId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
    post:
      operationId: createPurchaseOrder
      tags: [purchase-orders]
      summary: Create a purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /purchase-orders/{id}:
    get:
      operationId: getPurchaseOrder
      tags: [purchase-orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "404":
          description: Not found
    patch:
      operationId: updatePurchaseOrder
      tags: [purchase-orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
    delete:
      operationId: deletePurchaseOrder
      tags: [purchase-orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /purchase-orders/{id}/receive:
    post:
      operationId: receivePurchaseOrder
      tags: [purchase-orders]
      summary: Mark purchase order as received (increases stock)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase order received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  # Purchase Invoices
  /purchase-invoices:
    get:
      operationId: listPurchaseInvoices
      tags: [purchase-invoices]
      summary: List all purchase invoices
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: supplierId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of purchase invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseInvoice"
    post:
      operationId: createPurchaseInvoice
      tags: [purchase-invoices]
      summary: Create a purchase invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseInvoice"

  /purchase-invoices/{id}:
    get:
      operationId: getPurchaseInvoice
      tags: [purchase-invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseInvoice"
    patch:
      operationId: updatePurchaseInvoice
      tags: [purchase-invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseInvoice"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reports
  /reports/sales:
    get:
      operationId: getSalesReport
      tags: [reports]
      summary: Get sales report
      parameters:
        - name: from
          in: query
          schema:
            type: ["string", "null"]
        - name: to
          in: query
          schema:
            type: ["string", "null"]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"

  /reports/inventory:
    get:
      operationId: getInventoryReport
      tags: [reports]
      summary: Get inventory report
      parameters:
        - name: productId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Inventory report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryReport"

  /reports/purchases:
    get:
      operationId: getPurchasesReport
      tags: [reports]
      summary: Get purchases report
      parameters:
        - name: from
          in: query
          schema:
            type: ["string", "null"]
        - name: to
          in: query
          schema:
            type: ["string", "null"]
        - name: supplierId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Purchases report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchasesReport"

  /reports/sales/export:
    get:
      operationId: exportSalesReport
      tags: [reports]
      summary: Export sales report
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [pdf, excel]
        - name: from
          in: query
          schema:
            type: ["string", "null"]
          description: Optional start date for date-based reports
        - name: to
          in: query
          schema:
            type: ["string", "null"]
          description: Optional end date for date-based reports
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
          description: Optional customer filter for the sales report
      responses:
        "200":
          description: Exported sales report file
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.ms-excel:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid export format

  /reports/inventory/export:
    get:
      operationId: exportInventoryReport
      tags: [reports]
      summary: Export inventory report
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [pdf, excel]
        - name: productId
          in: query
          schema:
            type: ["integer", "null"]
          description: Optional product filter for the inventory report
      responses:
        "200":
          description: Exported inventory report file
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.ms-excel:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid export format

  /reports/purchases/export:
    get:
      operationId: exportPurchasesReport
      tags: [reports]
      summary: Export purchases report
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [pdf, excel]
        - name: from
          in: query
          schema:
            type: ["string", "null"]
          description: Optional start date for date-based reports
        - name: to
          in: query
          schema:
            type: ["string", "null"]
          description: Optional end date for date-based reports
        - name: supplierId
          in: query
          schema:
            type: ["integer", "null"]
          description: Optional supplier filter for the purchases report
      responses:
        "200":
          description: Exported purchases report file
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.ms-excel:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid export format

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # Dashboard
    DashboardSummary:
      type: object
      properties:
        totalSalesThisMonth:
          type: number
        totalOrdersThisMonth:
          type: integer
        totalCustomers:
          type: integer
        totalProducts:
          type: integer
        pendingOrders:
          type: integer
        lowStockCount:
          type: integer
        totalRevenueThisYear:
          type: number
        pendingInvoicesCount:
          type: integer
      required:
        - totalSalesThisMonth
        - totalOrdersThisMonth
        - totalCustomers
        - totalProducts
        - pendingOrders
        - lowStockCount
        - totalRevenueThisYear
        - pendingInvoicesCount

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        sku:
          type: string
        quantitySold:
          type: integer
        totalRevenue:
          type: number
      required: [productId, productName, sku, quantitySold, totalRevenue]

    LowStockItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        sku:
          type: string
        currentStock:
          type: integer
        minimumStock:
          type: integer
        warehouseName:
          type: string
      required:
        [productId, productName, sku, currentStock, minimumStock, warehouseName]

    # Customer
    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, name, createdAt]

    CustomerInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        company:
          type: string
      required: [name]

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        company:
          type: string

    # Supplier
    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, name, createdAt]

    SupplierInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        company:
          type: string
      required: [name]

    SupplierUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        company:
          type: string

    # Product
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        cost:
          type: ["number", "null"]
        unit:
          type: string
        minimumStock:
          type: integer
        createdAt:
          type: string
      required: [id, name, sku, price, unit, minimumStock, createdAt]

    ProductInput:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        description:
          type: string
        price:
          type: number
        cost:
          type: number
        unit:
          type: string
        minimumStock:
          type: integer
      required: [name, sku, price, unit, minimumStock]

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        description:
          type: string
        price:
          type: number
        cost:
          type: number
        unit:
          type: string
        minimumStock:
          type: integer

    # Warehouse
    Warehouse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, name, createdAt]

    WarehouseInput:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
      required: [name]

    WarehouseUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string

    # Stock
    StockLevel:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        sku:
          type: string
        warehouseId:
          type: integer
        warehouseName:
          type: string
        quantity:
          type: integer
        minimumStock:
          type: integer
      required:
        [
          productId,
          productName,
          sku,
          warehouseId,
          warehouseName,
          quantity,
          minimumStock,
        ]

    # Order Item
    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        total:
          type: number
      required: [id, productId, productName, quantity, unitPrice, total]

    OrderItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        unitPrice:
          type: number
      required: [productId, quantity, unitPrice]

    # Quotation
    Quotation:
      type: object
      properties:
        id:
          type: integer
        reference:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        validUntil:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
      required:
        [
          id,
          reference,
          customerId,
          customerName,
          status,
          totalAmount,
          createdAt,
          items,
        ]

    QuotationInput:
      type: object
      properties:
        customerId:
          type: integer
        validUntil:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
      required: [customerId, items]

    QuotationUpdate:
      type: object
      properties:
        status:
          type: string
        validUntil:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    # Sales Order
    Order:
      type: object
      properties:
        id:
          type: integer
        reference:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        notes:
          type: ["string", "null"]
        quotationId:
          type: ["integer", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
      required:
        [
          id,
          reference,
          customerId,
          customerName,
          status,
          totalAmount,
          createdAt,
          items,
        ]

    OrderInput:
      type: object
      properties:
        customerId:
          type: integer
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
      required: [customerId, items]

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
        notes:
          type: string

    # Invoice
    Invoice:
      type: object
      properties:
        id:
          type: integer
        reference:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        orderId:
          type: ["integer", "null"]
        status:
          type: string
        totalAmount:
          type: number
        dueDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
      required:
        [
          id,
          reference,
          customerId,
          customerName,
          status,
          totalAmount,
          createdAt,
          items,
        ]

    InvoiceInput:
      type: object
      properties:
        customerId:
          type: integer
        orderId:
          type: integer
        dueDate:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
      required: [customerId, items]

    InvoiceUpdate:
      type: object
      properties:
        status:
          type: string
        dueDate:
          type: string
        notes:
          type: string

    # Purchase Order
    PurchaseOrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitCost:
          type: number
        total:
          type: number
      required: [id, productId, productName, quantity, unitCost, total]

    PurchaseOrderItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        unitCost:
          type: number
      required: [productId, quantity, unitCost]

    PurchaseOrder:
      type: object
      properties:
        id:
          type: integer
        reference:
          type: string
        supplierId:
          type: integer
        supplierName:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        expectedDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItem"
        createdAt:
          type: string
      required:
        [
          id,
          reference,
          supplierId,
          supplierName,
          status,
          totalAmount,
          createdAt,
          items,
        ]

    PurchaseOrderInput:
      type: object
      properties:
        supplierId:
          type: integer
        expectedDate:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItemInput"
      required: [supplierId, items]

    PurchaseOrderUpdate:
      type: object
      properties:
        status:
          type: string
        expectedDate:
          type: string
        notes:
          type: string

    # Purchase Invoice
    PurchaseInvoice:
      type: object
      properties:
        id:
          type: integer
        reference:
          type: string
        supplierId:
          type: integer
        supplierName:
          type: string
        purchaseOrderId:
          type: ["integer", "null"]
        status:
          type: string
        totalAmount:
          type: number
        dueDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        [
          id,
          reference,
          supplierId,
          supplierName,
          status,
          totalAmount,
          createdAt,
        ]

    PurchaseInvoiceInput:
      type: object
      properties:
        supplierId:
          type: integer
        purchaseOrderId:
          type: integer
        totalAmount:
          type: number
        dueDate:
          type: string
        notes:
          type: string
      required: [supplierId, totalAmount]

    PurchaseInvoiceUpdate:
      type: object
      properties:
        status:
          type: string
        dueDate:
          type: string
        notes:
          type: string

    # Users
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        department:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
      required: [id, name, email, role, active, createdAt]

    UserInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 8
        role:
          type: string
        department:
          type: string
        active:
          type: boolean
      required: [name, email, password, role]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
        department:
          type: string
        active:
          type: boolean

    # Reports
    SalesReportRow:
      type: object
      properties:
        date:
          type: string
        ordersCount:
          type: integer
        revenue:
          type: number
      required: [date, ordersCount, revenue]

    TopCustomer:
      type: object
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        totalSpent:
          type: number
        ordersCount:
          type: integer
      required: [customerId, customerName, totalSpent, ordersCount]

    SalesReport:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        rows:
          type: array
          items:
            $ref: "#/components/schemas/SalesReportRow"
        topCustomers:
          type: array
          items:
            $ref: "#/components/schemas/TopCustomer"
      required: [totalRevenue, totalOrders, rows, topCustomers]

    InventoryReportRow:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        sku:
          type: string
        totalStock:
          type: integer
        minimumStock:
          type: integer
        stockValue:
          type: number
      required:
        [productId, productName, sku, totalStock, minimumStock, stockValue]

    InventoryReport:
      type: object
      properties:
        totalProducts:
          type: integer
        totalStockValue:
          type: number
        lowStockCount:
          type: integer
        rows:
          type: array
          items:
            $ref: "#/components/schemas/InventoryReportRow"
      required: [totalProducts, totalStockValue, lowStockCount, rows]

    PurchasesReportRow:
      type: object
      properties:
        date:
          type: string
        purchaseOrdersCount:
          type: integer
        totalSpent:
          type: number
      required: [date, purchaseOrdersCount, totalSpent]

    TopSupplier:
      type: object
      properties:
        supplierId:
          type: integer
        supplierName:
          type: string
        totalPurchased:
          type: number
        ordersCount:
          type: integer
      required: [supplierId, supplierName, totalPurchased, ordersCount]

    PurchasesReport:
      type: object
      properties:
        totalSpent:
          type: number
        totalPurchaseOrders:
          type: integer
        rows:
