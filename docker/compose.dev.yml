services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sme_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sme_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  front-mock:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    environment:
      HOST: 0.0.0.0
      PORT: 8081
      BASE_PATH: /
    ports:
      - "8081:8081"

volumes:
  postgres-data:
